<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WV Weltall Verlag – Digitale Editionen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }

        h1, h2, h3 {
            text-align: center;
        }

        .box {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: #0078d4;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
        }

        .button:hover {
            background: #005fa3;
        }

        /* Buch-Boxen */
        .book-box {
            flex: 1;
            min-width: 320px;
            text-align: center;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .book-box img {
            width: 180px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .download-counter {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #ddd;
            padding-top: 6px;
        }
    </style>
</head>

<body>

<h1>WV Weltall Verlag – Digitale Editionen</h1>

<hr>

<h2>📱 Digitale App‑Editionen</h2>

<div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">

    <div class="box" style="flex:1; min-width:280px;">
        <h2>🤖 Android‑Version</h2>
        <p>Version: 1.0.0 (Release Build)</p>
        <a class="button" href="https://github.com/weltall-verlag/i-ching/releases/download/v1.0.0/app-release.apk">
            APK herunterladen
        </a>
    </div>

    <div class="box" style="flex:1; min-width:280px;">
        <h2>🖥️ Windows‑Version</h2>
        <p>Version: 1.0.0 (Release Build)</p>
        <a class="button" href="https://github.com/weltall-verlag/i-ching/releases/download/v1.0.0/i-ching-windows.zip">
            ZIP herunterladen
        </a>
    </div>

    <div class="box" style="flex:1; min-width:280px;">
        <h2>🍎 iOS – geplant</h2>
        <p>Noch nicht verfügbar</p>
    </div>

</div>

<!-- Counter für App-Downloads -->
<div style="margin-top:30px; font-size:14px; color:#555; text-align:center;">
    <p>🤖 APK Downloads: <span id="apkDownloads">…</span></p>
    <p>🖥️ Windows ZIP Downloads: <span id="zipDownloads">…</span></p>
</div>
