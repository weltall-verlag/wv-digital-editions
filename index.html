<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WV Weltall Verlag – Digitale Buch-Editionen</title>

    <!-- Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Georgia", serif;
            background: #f7f7f7;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            font-family: "Playfair Display", serif;
            font-size: 2.6em;
            font-weight: 700;
            color: #1b7b7b;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        h2 {
            font-family: "Playfair Display", serif;
            font-size: 1.9em;
            font-weight: 600;
            color: #1b7b7b;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 25px;
            letter-spacing: 0.3px;
        }

        h3 {
            font-family: "Playfair Display", serif;
            font-size: 1.4em;
            font-weight: 600;
            color: #1b7b7b;
            text-align: center;
            margin-bottom: 15px;
        }

        .books-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .book-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 360px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .cover {
            display: block;
            width: 220px;
            margin: 0 auto 15px auto;
            border-radius: 6px;
        }
.button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #1b7b7b;
    color: white;
    padding: 10px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 1.1em;
    margin-top: 10px;

    /* Animation */
    transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
}

.button:hover {
    background: #219191; /* etwas heller */
    transform: translateY(-2px); /* ganz leichte Anhebung */
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); /* dezenter Schatten */
}
        .downloads {
            margin-top: 8px;
            font-size: 0.9em;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>WV Weltall Verlag – Digitale Buch‑Editionen</h1>
<h2>Bücher von Radovan Savić</h2>

<div class="books-container">

    <!-- RUSSISCH -->
    <div class="book-box">
        <h3>🇷🇺 Русский</h3>
        <img src="radovan-savich-ru/cover_ru.jpg" class="cover" alt="Russisches Cover">

        <a class="button"
           href="https://github.com/weltall-verlag/wv-digital-editions/releases/download/v1.0.0/savich-s-gitaroj-po-ghizni.pdf"
           download>
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg">
            Скачать PDF
        </a>

        <div class="downloads" id="downloads-ru">Downloads: …</div>
    </div>

    <!-- SERBISCH -->
    <div class="book-box">
        <h3>🇷🇸 Српски</h3>
        <img src="radovan-savich-rs/cover_sr.jpg" class="cover" alt="Serbisches Cover">

        <a class="button"
           href="https://github.com/weltall-verlag/wv-digital-editions/releases/download/v1.0.0/savich-gitarom-kroz-zivot.pdf"
           download>
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg">
            Preuzmi PDF
        </a>

        <div class="downloads" id="downloads-rs">Downloads: …</div>
    </div>

</div>

<script>
fetch("https://api.github.com/repos/weltall-verlag/wv-digital-editions/releases/latest")
    .then(response => response.json())
    .then(data => {
        let assets = data.assets;

        let ru = assets.find(a => a.name.includes("savich-s-gitaroj-po-ghizni"));
        let rs = assets.find(a => a.name.includes("savich-gitarom-kroz-zivot"));

        if (ru) document.getElementById("downloads-ru").innerText = "Downloads: " + ru.download_count;
        if (rs) document.getElementById("downloads-rs").innerText = "Downloads: " + rs.download_count;
    })
    .catch(error => console.error("Fehler beim Abrufen der Download-Zähler:", error));
</script>

</body>
</html>
